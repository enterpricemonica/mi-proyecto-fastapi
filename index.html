<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Full-Stack Task Manager</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            max-width: 500px; 
            margin: 40px auto; 
            padding: 20px; 
            background-color: #f4f7f6; 
        }
        h1 { 
            color: #2c3e50; 
            text-align: center; 
        }
        form { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 16px; 
        }
        button { 
            padding: 10px 15px; 
            background-color: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover { 
            background-color: #27ae60; 
        }
        ul { 
            list-style: none; 
            padding: 0; 
        }
        
        li { 
            background: white; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            border-left: 5px solid #3498db; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        /* Dynamic CSS: Style for completed tasks */
        .completed {
            border-left-color: #bdc3c7;
            background-color: #eaeded;
            color: #7f8c8d;
            text-decoration: line-through;
        }

        .left-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        input[type="checkbox"] { 
            width: 18px; 
            height: 18px; 
            cursor: pointer; 
        }
        .btn-delete { 
            background-color: #e74c3c; 
            padding: 5px 10px; 
            font-size: 12px; 
        }
        .btn-delete:hover { 
            background-color: #c0392b; 
        }
    </style>
</head>
<body>

    <h1>Task List</h1>
    
    <form id="task-form">
        <input type="text" id="task-input" placeholder="What do you need to do today?" required>
        <button type="submit">Add</button>
    </form>

    <ul id="task-list"></ul>

    <script>
        const API_URL = "https://mi-proyecto-fastapi-production.up.railway.app/tareas";

        # Load Tasks (GET)
        async function loadTasks() {
            const response = await fetch(API_URL);
            const tasks = await response.json();
            const list = document.getElementById("task-list");
            list.innerHTML = "";
            
            tasks.forEach(t => {
                const li = document.createElement("li");
                
                # If the task is completed, apply the CSS class to cross it out
                if (t.completada) {
                    li.className = "completed";
                }
                
                # Container for checkbox and text
                const leftContainer = document.createElement("div");
                leftContainer.className = "left-container";
                
                # Create Checkbox
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = t.completada;
                # Changing the checkbox triggers the PUT request
                checkbox.onchange = () => toggleTask(t.id);
                
                const span = document.createElement("span");
                span.textContent = t.tarea;
                
                leftContainer.appendChild(checkbox);
                leftContainer.appendChild(span);
                li.appendChild(leftContainer);
                
                # Delete Button
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Delete";
                deleteButton.className = "btn-delete";
                deleteButton.onclick = () => deleteTask(t.id);
                
                li.appendChild(deleteButton);
                list.appendChild(li);
            });
        }

        # Save Tasks (POST)
        document.getElementById("task-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const input = document.getElementById("task-input");
            
            # Basic validation: avoid sending empty spaces
            if (!input.value.trim()) return;

            const newTask = { id: Date.now(), tarea: input.value.trim(), completada: false };

            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newTask)
            });

            input.value = "";
            loadTasks();
        });

        # Toggle completion status (PUT)
        async function toggleTask(id) {
            await fetch(`${API_URL}/${id}`, {
                method: "PUT"
            });
            loadTasks();
        }

        # Delete Task (DELETE)
        async function deleteTask(id) {
            await fetch(`${API_URL}/${id}`, {
                method: "DELETE"
            });
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
