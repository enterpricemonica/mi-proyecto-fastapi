<script>
    const API_URL = "https://mi-proyecto-fastapi-production.up.railway.app/tareas";

    // Load Tasks (GET)
    async function loadTasks() {
        try {
            const response = await fetch(API_URL);
            const tasks = await response.json();
            const list = document.getElementById("task-list");
            list.innerHTML = "";

            tasks.forEach(t => {
                const li = document.createElement("li");

                // Check completion status from Python backend
                if (t.completada) {
                    li.className = "completed";
                }

                // Container for checkbox and text
                const leftContainer = document.createElement("div");
                leftContainer.className = "left-container";

                // Create Checkbox
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = t.completada;
                checkbox.onchange = () => toggleTask(t.id);

                const span = document.createElement("span");
                span.textContent = t.tarea; // Matches 'tarea' field in Python

                leftContainer.appendChild(checkbox);
                leftContainer.appendChild(span);
                li.appendChild(leftContainer);

                // Delete Button
                const deleteButton = document.createElement("button");
                deleteButton.textContent = "Delete";
                deleteButton.className = "btn-delete";
                deleteButton.onclick = () => deleteTask(t.id);

                li.appendChild(deleteButton);
                list.appendChild(li);
            });
        } catch (error) {
            console.error("Error loading tasks:", error);
        }
    }

    // Save Tasks (POST)
    document.getElementById("task-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const input = document.getElementById("task-input");

        if (!input.value.trim()) return;

        // Envia 'tarea' y 'completada' en minúsculas idéntico a tu Pydantic en Python
        const newTask = { id: Date.now(), tarea: input.value.trim(), completada: false };

        try {
            await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newTask)
            });

            input.value = "";
            loadTasks();
        } catch (error) {
            console.error("Error saving task:", error);
        }
    });

    // Toggle completion status (PUT)
    async function toggleTask(id) {
        try {
            await fetch(`${API_URL}/${id}`, {
                method: "PUT"
            });
            loadTasks();
        } catch (error) {
            console.error("Error toggling task:", error);
        }
    }

    // Delete Task (DELETE)
    async function deleteTask(id) {
        try {
            await fetch(`${API_URL}/${id}`, {
                method: "DELETE"
            });
            loadTasks();
        } catch (error) {
            console.error("Error deleting task:", error);
        }
    }

    loadTasks();
</script>
